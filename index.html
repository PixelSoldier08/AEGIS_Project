<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stark-OS | Protocol 14</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --stark-blue: #00d4ff;
            --terminal-green: #00ffcc;
        }

        body { 
            background: #0a0a0a; 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0;
            overflow: hidden; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            height: 100vh;
        }

        .ui-container {
            border: 1px solid var(--stark-blue);
            padding: 40px 50px;
            background: rgba(0, 0, 0, 0.9);
            text-align: center;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.2);
            z-index: 10;
        }

        input {
            background: #111;
            border: 1px solid var(--stark-blue);
            color: white;
            padding: 12px;
            width: 250px;
            text-align: center;
            outline: none;
            margin-bottom: 15px;
        }

        button {
            padding: 12px 30px;
            cursor: pointer;
            font-weight: bold;
            background: var(--stark-blue);
            color: black;
            border: none;
            text-transform: uppercase;
        }

        #no-btn { 
            background: #ff4d4d; 
            color: white; 
            position: fixed; 
            transition: all 0.15s ease-out;
            z-index: 100;
        }

        #terminal {
            display: none;
            text-align: left;
            font-family: 'Courier New', monospace;
            color: var(--terminal-green);
            width: 80%;
            max-width: 700px;
            padding: 30px;
            border-left: 4px solid var(--terminal-green);
        }

        .video-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: black;
            display: none;
            z-index: 9999;
        }
        
        video { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body onmousemove="flee(event)">

    <!-- LOGIN GATEWAY -->
    <div id="auth-gate" class="ui-container">
        <h2>STARK AUTHENTICATION</h2>
        <input type="text" id="usernameInput" placeholder="USER NAME">
        <br>
        <input type="password" id="passInput" placeholder="ACCESS CODE">
        <br>
        <button onclick="verifyCredentials()">INITIALIZE</button>
    </div>

    <!-- THE QUESTION -->
    <div id="question-ui" class="ui-container" style="display: none;">
        <h1 id="welcomeMessage">SYSTEM ONLINE</h1>
        <div style="margin-top: 50px; position: relative; height: 100px;">
            <button onclick="triggerCelebration()">YES</button>
            <button id="no-btn" style="left: 60%; top: 50%;">NO</button>
        </div>
    </div>

    <div id="terminal"></div>

    <div id="video-wrap" class="video-overlay">
        <video id="celebrationVideo" controls>
            <source src="vijay_entry.mp4" type="video/mp4">
        </video>
    </div>

    <!-- THE AUDIO ELEMENTS -->
    <audio id="vijayRef">
        <source src="vijay_voice.mp3" type="audio/mpeg">
    </audio>

    <script>
        const SECRET_KEY = "STARK_2026";
        let currentUser = "";

        function playPersonalizedSequence(name) {
            const audio = document.getElementById('vijayRef');
            
            // 1. Play the Original Audio first
            audio.play();

            // 2. Schedule the Username Greeting
            // We set a small delay so the name is spoken over the audio's background or right after
            setTimeout(() => {
                const msg = new SpeechSynthesisUtterance();
                msg.text = `Welcome... ${name}.`;
                msg.rate = 0.8; // Deep, slow voice
                msg.pitch = 0.5; // Lower pitch to match the "Stark" vibe
                window.speechSynthesis.speak(msg);
            }, 2500); // Adjust this delay (in ms) to match the timing of your mp3

            // 3. Reveal the UI after the greeting starts
            setTimeout(() => {
                document.getElementById('auth-gate').style.display = "none";
                document.getElementById('question-ui').style.display = "block";
                document.getElementById('welcomeMessage').innerText = `Greetings, ${name}. Are you a fan?`;
            }, 1000);
        }

        function verifyCredentials() {
            const user = document.getElementById('usernameInput').value;
            const pass = document.getElementById('passInput').value;

            if (user.trim() !== "" && pass === SECRET_KEY) {
                currentUser = user;
                playPersonalizedSequence(currentUser);
            } else {
                alert("ACCESS DENIED");
            }
        }

        function flee(e) {
            const noBtn = document.getElementById('no-btn');
            const questionUI = document.getElementById('question-ui');
            if (questionUI.style.display === "none") return;

            const rect = noBtn.getBoundingClientRect();
            const dist = Math.hypot(e.clientX - (rect.left + rect.width/2), e.clientY - (rect.top + rect.height/2));

            if (dist < 180) {
                const angle = Math.atan2((rect.top + rect.height/2) - e.clientY, (rect.left + rect.width/2) - e.clientX);
                let newX = rect.left + Math.cos(angle) * 250;
                let newY = rect.top + Math.sin(angle) * 250;

                // Stay on screen
                newX = Math.max(50, Math.min(newX, window.innerWidth - 150));
                newY = Math.max(50, Math.min(newY, window.innerHeight - 100));

                noBtn.style.left = newX + 'px';
                noBtn.style.top = newY + 'px';
            }
        }

        function triggerCelebration() {
            confetti({ particleCount: 200, spread: 100, origin: { y: 0.6 } });
            setTimeout(() => {
                document.getElementById('question-ui').style.display = "none";
                startTerminal();
            }, 1000);
        }

        function startTerminal() {
            const term = document.getElementById('terminal');
            term.style.display = "block";
            const logs = [
                `> ACCESSING STARK DATABASE...`,
                `> USER ${currentUser.toUpperCase()} VERIFIED...`,
                "> DEPLOYING vijay_entry.mp4..."
            ];
            let i = 0;
            function type() {
                if (i < logs.length) {
                    term.innerHTML += `<p>${logs[i]}</p>`; i++;
                    setTimeout(type, 700);
                } else { setTimeout(showVideo, 500); }
            }
            type();
        }

        function showVideo() {
            document.getElementById('terminal').style.display = "none";
            document.getElementById('video-wrap').style.display = "block";
            const vid = document.getElementById('celebrationVideo');
            vid.play();
            if (vid.requestFullscreen) vid.requestFullscreen();
        }
    </script>
</body>
</html>
