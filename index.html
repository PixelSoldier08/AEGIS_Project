<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stark-OS | Protocol 14</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --stark-blue: #00d4ff;
            --stark-red: #ff4d4d;
            --terminal-green: #00ffcc;
        }

        body { 
            background: #0a0a0a; 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0;
            overflow: hidden; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            height: 100vh;
            background-size: cover;
            background-position: center;
        }

        .ui-container {
            border: 1px solid var(--stark-blue);
            padding: 40px 50px;
            background: rgba(0, 0, 0, 0.9);
            text-align: center;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.2);
            z-index: 10;
            border-radius: 5px;
        }

        h2 { color: var(--stark-blue); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 25px; }

        .input-group { margin-bottom: 15px; }

        input {
            background: #111;
            border: 1px solid var(--stark-blue);
            color: white;
            padding: 12px;
            width: 250px;
            text-align: center;
            outline: none;
            font-family: 'Courier New', monospace;
        }

        button {
            padding: 12px 30px;
            cursor: pointer;
            font-weight: bold;
            border: none;
            text-transform: uppercase;
            transition: 0.3s;
            margin-top: 10px;
        }

        #yes-btn { background: var(--stark-blue); color: black; position: relative; z-index: 101; }
        
        #no-btn { 
            background: var(--stark-red); 
            color: white; 
            position: fixed; 
            transition: all 0.15s ease-out;
            z-index: 100;
        }

        #terminal {
            display: none;
            text-align: left;
            font-family: 'Courier New', monospace;
            color: var(--terminal-green);
            width: 80%;
            max-width: 700px;
            background: rgba(0, 0, 0, 0.95);
            padding: 30px;
            border-left: 4px solid var(--terminal-green);
            z-index: 50;
        }

        .video-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: black;
            display: none;
            z-index: 9999;
        }
        
        video { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body onmousemove="flee(event)">

    <!-- PHASE 1: LOGIN GATEWAY -->
    <div id="auth-gate" class="ui-container">
        <h2>System Authentication</h2>
        <div class="input-group">
            <input type="text" id="usernameInput" placeholder="USER IDENTIFICATION">
        </div>
        <div class="input-group">
            <input type="password" id="passInput" placeholder="ACCESS CODE">
        </div>
        <button id="yes-btn" onclick="verifyCredentials()">INITIALIZE</button>
    </div>

    <!-- PHASE 2: THE INTERACTIVE QUESTION -->
    <div id="question-ui" class="ui-container" style="display: none;">
        <h1 id="welcomeMessage">Analyzing...</h1>
        <div style="margin-top: 50px; position: relative; height: 100px;">
            <button id="yes-btn" onclick="triggerCelebration()">YES</button>
            <button id="no-btn" style="left: 55%; top: 50%;">NO</button>
        </div>
    </div>

    <div id="terminal"></div>

    <div id="video-wrap" class="video-overlay">
        <video id="celebrationVideo" controls>
            <source src="vijay_entry.mp4" type="video/mp4">
        </video>
    </div>

    <script>
        const SECRET_KEY = "STARK_2026"; 
        let currentUser = "";

        // VOICE ENGINE: Greeting function
        function speakWelcome(name) {
            const msg = new SpeechSynthesisUtterance();
            msg.text = `Welcome, ${name}. Answer the following security question. Are you a Thalapathy Vijay fan?`;
            msg.volume = 1;
            msg.rate = 0.9; // Slightly slower for dramatic effect
            msg.pitch = 1;
            window.speechSynthesis.speak(msg);
        }

        function verifyCredentials() {
            const user = document.getElementById('usernameInput').value;
            const pass = document.getElementById('passInput').value;

            if (user.trim() !== "" && pass === SECRET_KEY) {
                currentUser = user;
                document.getElementById('auth-gate').style.display = "none";
                document.getElementById('question-ui').style.display = "block";
                
                // Update text and trigger voice[cite: 1, 3]
                document.getElementById('welcomeMessage').innerText = `Greetings, ${currentUser}. Are you a Vijay fan?`;
                speakWelcome(currentUser);
            } else {
                alert("ACCESS DENIED: INVALID USER OR CODE");
            }
        }

        function flee(e) {
            const noBtn = document.getElementById('no-btn');
            const questionUI = document.getElementById('question-ui');
            if (questionUI.style.display === "none") return;

            const rect = noBtn.getBoundingClientRect();
            const btnX = rect.left + rect.width / 2;
            const btnY = rect.top + rect.height / 2;
            const dist = Math.hypot(e.clientX - btnX, e.clientY - btnY);

            if (dist < 180) { 
                const angle = Math.atan2(btnY - e.clientY, btnX - e.clientX);
                const jumpDist = 250; 
                let newX = rect.left + Math.cos(angle) * jumpDist;
                let newY = rect.top + Math.sin(angle) * jumpDist;

                const pad = 80;
                const winW = window.innerWidth;
                const winH = window.innerHeight;

                if (newX < pad || newX > winW - rect.width - pad) {
                    newX = Math.random() * (winW - rect.width - pad * 2) + pad;
                }
                if (newY < pad || newY > winH - rect.height - pad) {
                    newY = Math.random() * (winH - rect.height - pad * 2) + pad;
                }

                noBtn.style.left = newX + 'px';
                noBtn.style.top = newY + 'px';
            }
        }

        function triggerCelebration() {
            confetti({
                particleCount: 200,
                spread: 100,
                origin: { y: 0.6 },
                colors: ['#00d4ff', '#ffffff', '#ff4d4d']
            });

            setTimeout(() => {
                document.getElementById('question-ui').style.display = "none";
                startTerminal();
            }, 1000);
        }

        function startTerminal() {
            const term = document.getElementById('terminal');
            term.style.display = "block";
            const logs = [
                `> AUTHENTICATING USER: ${currentUser.toUpperCase()}...`,
                "> INITIALIZING EMOTIONAL OVERRIDE...",
                "> BYPASSING LOCAL FIREWALLS...",
                "> DEPLOYING STARK-OS CELEBRATION...",
                "> ACCESSING ENCRYPTED MEDIA: vijay_entry.mp4...",
                "> AUTHENTICATION SUCCESSFUL."
            ];

            let i = 0;
            function type() {
                if (i < logs.length) {
                    term.innerHTML += `<p style="margin: 5px 0;">${logs[i]}</p>`;
                    i++;
                    setTimeout(type, 700);
                } else {
                    setTimeout(showVideo, 500);
                }
            }
            type();
        }

        function showVideo() {
            const bg = "https://lh3.googleusercontent.com/pw/AP1GczOCB5V1R7M5p-E_I9u-e6z0R1R9R-E1zR1R9R-E1zR1R9R-E1zR1R9R-E1zR1R9R-E1zR1R9R-E1zR1R9R-E1zR1R9R-E1zR1R9R-E1zR1R9R-E1z=w1920-h887-s-no-gm?authuser=0";
            document.body.style.backgroundImage = `url('${bg}')`;
            document.getElementById('terminal').style.display = "none";
            const wrap = document.getElementById('video-wrap');
            wrap.style.display = "block";
            const vid = document.getElementById('celebrationVideo');
            vid.play();
            if (vid.requestFullscreen) vid.requestFullscreen();
        }
    </script>
</body>
</html>
